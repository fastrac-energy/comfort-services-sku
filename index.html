<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Comfort Services SKU Lookup</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.x/dist/tabler-icons.min.css" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --navy:        #0b1120;
      --navy-mid:    #131c30;
      --navy-card:   #1a2540;
      --navy-border: #253050;
      --orange:      #f5a623;
      --orange-dim:  rgba(245,166,35,0.13);
      --orange-bdr:  rgba(245,166,35,0.45);
      --white:       #ffffff;
      --muted:       rgba(255,255,255,0.5);
      --faint:       rgba(255,255,255,0.06);
      --green:       #5ecf8a;
      --font:        -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      --mono:        'SFMono-Regular', Consolas, 'Liberation Mono', Menlo, monospace;
    }

    body {
      background: #07090f;
      min-height: 100vh;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 32px 16px 64px;
      font-family: var(--font);
    }

    .wrap {
      background: var(--navy);
      border-radius: 16px;
      overflow: hidden;
      width: 100%;
      max-width: 660px;
      border: 1px solid var(--navy-border);
    }

    /* Header */
    .hdr {
      background: var(--navy-mid);
      border-bottom: 1px solid var(--navy-border);
      padding: 14px 20px;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .logo {
      width: 34px; height: 34px;
      background: var(--orange);
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }
    .logo i { color: var(--navy); font-size: 18px; }
    .hdr-text .t1 { font-size: 15px; font-weight: 600; color: var(--white); }
    .hdr-text .t2 { font-size: 10px; color: var(--orange); letter-spacing: 0.07em; text-transform: uppercase; margin-top: 1px; }

    /* Body */
    .body { padding: 18px 20px; }

    /* Steps */
    .steps {
      display: flex;
      border: 1px solid var(--navy-border);
      border-radius: 10px;
      overflow: hidden;
      margin-bottom: 20px;
    }
    .step {
      flex: 1;
      padding: 10px 13px;
      border-right: 1px solid var(--navy-border);
      cursor: default;
      transition: background 0.12s;
    }
    .step:last-child { border-right: none; }
    .step.done { cursor: pointer; }
    .step.done:hover { background: var(--orange-dim); }
    .step-num { font-size: 10px; color: var(--orange); font-weight: 600; text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 3px; }
    .step-val { font-size: 13px; font-weight: 500; color: var(--white); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .step-val.placeholder { color: var(--muted); font-weight: 400; }
    .step-edit { font-size: 10px; color: var(--orange); margin-top: 2px; opacity: 0; transition: opacity 0.1s; }
    .step.done:hover .step-edit { opacity: 1; }

    /* Panels */
    .panel { display: none; }
    .panel.show { display: block; }
    .panel-label { font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.07em; margin-bottom: 11px; font-weight: 500; }

    /* Type cards */
    .type-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .type-card {
      background: var(--navy-card);
      border: 1px solid var(--navy-border);
      border-radius: 12px;
      padding: 18px 16px;
      cursor: pointer;
      transition: border-color 0.12s, background 0.12s;
      display: flex; flex-direction: column; gap: 7px;
    }
    .type-card:hover { border-color: var(--orange-bdr); background: var(--orange-dim); }
    .type-card i { font-size: 24px; color: var(--orange); }
    .type-card .tc-name { font-size: 14px; font-weight: 600; color: var(--white); }
    .type-card .tc-count { font-size: 12px; color: var(--muted); }

    /* Series cards */
    .series-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 9px; }
    .series-card {
      background: var(--navy-card);
      border: 1px solid var(--navy-border);
      border-radius: 10px;
      padding: 13px 12px;
      cursor: pointer;
      transition: border-color 0.12s, background 0.12s;
    }
    .series-card:hover { border-color: var(--orange-bdr); background: var(--orange-dim); }
    .series-card .sc-name { font-size: 13px; font-weight: 600; color: var(--white); margin-bottom: 4px; }
    .series-card .sc-stage { font-size: 11px; color: var(--muted); margin-bottom: 3px; }
    .series-card .sc-desc { font-size: 11px; color: var(--orange); opacity: 0.85; }

    /* Tonnage pills */
    .ton-row { display: flex; gap: 9px; flex-wrap: wrap; }
    .ton-pill {
      background: var(--navy-card);
      border: 1px solid var(--navy-border);
      border-radius: 99px;
      padding: 8px 22px;
      cursor: pointer;
      font-size: 14px;
      font-weight: 500;
      color: var(--white);
      font-family: var(--font);
      transition: border-color 0.12s, background 0.12s, color 0.12s;
    }
    .ton-pill:hover { border-color: var(--orange-bdr); background: var(--orange-dim); color: var(--orange); }

    /* Detail */
    .detail {
      background: var(--navy-card);
      border: 1px solid var(--navy-border);
      border-radius: 13px;
      padding: 16px;
      display: none;
    }
    .detail.show { display: block; }
    .detail-title { font-size: 14px; font-weight: 600; color: var(--white); margin-bottom: 14px; padding-bottom: 12px; border-bottom: 1px solid var(--navy-border); }

    .sku-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 13px; }
    .sku-box { background: var(--navy); border: 1px solid var(--navy-border); border-radius: 9px; padding: 12px 13px; }
    .sku-box .sl { font-size: 10px; color: var(--orange); font-weight: 600; text-transform: uppercase; letter-spacing: 0.07em; margin-bottom: 6px; display: flex; align-items: center; gap: 5px; }
    .sku-box .sl i { font-size: 13px; }
    .sku-box .sv { font-family: var(--mono); font-size: 14px; font-weight: 600; color: var(--white); margin-bottom: 3px; word-break: break-all; }
    .sku-box .sd { font-size: 11px; color: var(--muted); margin-bottom: 10px; line-height: 1.4; }

    .cp-btn {
      display: inline-flex; align-items: center; gap: 5px;
      font-size: 11px; color: var(--orange);
      background: var(--orange-dim); border: 1px solid var(--orange-bdr);
      border-radius: 6px; padding: 4px 11px;
      cursor: pointer; font-family: var(--font);
      transition: background 0.1s;
    }
    .cp-btn:hover { background: rgba(245,166,35,0.25); }
    .cp-btn i { font-size: 12px; }
    .cp-ok { font-size: 11px; color: var(--green); margin-left: 7px; display: none; }

    .badges { display: flex; gap: 7px; flex-wrap: wrap; margin-bottom: 14px; }
    .badge { font-size: 11px; color: var(--muted); background: var(--faint); border: 1px solid var(--navy-border); border-radius: 99px; padding: 3px 11px; }

    .reset-btn {
      display: inline-flex; align-items: center; gap: 6px;
      font-size: 12px; color: var(--muted);
      background: none; border: none; cursor: pointer;
      font-family: var(--font); padding: 0;
      transition: color 0.1s;
    }
    .reset-btn:hover { color: var(--orange); }
    .reset-btn i { font-size: 14px; }

    /* Responsive */
    @media (max-width: 480px) {
      body { padding: 16px 10px 48px; }
      .series-grid { grid-template-columns: 1fr 1fr; }
      .sku-row { grid-template-columns: 1fr; }
      .steps { flex-direction: column; }
      .step { border-right: none; border-bottom: 1px solid var(--navy-border); }
      .step:last-child { border-bottom: none; }
    }
  </style>
</head>
<body>

<div class="wrap">
  <div class="hdr">
    <div class="logo"><i class="ti ti-snowflake"></i></div>
    <div class="hdr-text">
      <div class="t1">Comfort Services SKU Lookup</div>
      <div class="t2">Carrier Product Catalog</div>
    </div>
  </div>

  <div class="body">
    <div class="steps">
      <div class="step" id="s1" onclick="goStep(1)">
        <div class="step-num">Step 1</div>
        <div class="step-val placeholder" id="s1v">Equipment type</div>
        <div class="step-edit">Change</div>
      </div>
      <div class="step" id="s2" onclick="goStep(2)">
        <div class="step-num">Step 2</div>
        <div class="step-val placeholder" id="s2v">Series</div>
        <div class="step-edit">Change</div>
      </div>
      <div class="step" id="s3" onclick="goStep(3)">
        <div class="step-num">Step 3</div>
        <div class="step-val placeholder" id="s3v">Tonnage</div>
        <div class="step-edit">Change</div>
      </div>
    </div>

    <!-- Step 1: Type -->
    <div class="panel show" id="p1">
      <div class="panel-label">Choose equipment type</div>
      <div class="type-grid">
        <div class="type-card" onclick="pickType('ac')">
          <i class="ti ti-device-air-conditioner"></i>
          <div class="tc-name">Air conditioner</div>
          <div class="tc-count">15 products</div>
        </div>
        <div class="type-card" onclick="pickType('hp')">
          <i class="ti ti-temperature-plus"></i>
          <div class="tc-name">Heat pump</div>
          <div class="tc-count">13 products</div>
        </div>
      </div>
    </div>

    <!-- Step 2: Series -->
    <div class="panel" id="p2">
      <div class="panel-label">Choose series</div>
      <div class="series-grid" id="series-grid"></div>
    </div>

    <!-- Step 3: Tonnage -->
    <div class="panel" id="p3">
      <div class="panel-label">Choose tonnage</div>
      <div class="ton-row" id="ton-row"></div>
    </div>

    <!-- Result -->
    <div class="detail" id="detail">
      <div class="detail-title" id="d-title"></div>
      <div class="sku-row">
        <div class="sku-box">
          <div class="sl"><i class="ti ti-device-air-conditioner"></i> Condenser SKU</div>
          <div class="sv" id="d-sku"></div>
          <div class="sd" id="d-model"></div>
          <button class="cp-btn" onclick="doCopy('d-sku','cp1')"><i class="ti ti-copy"></i> Copy</button>
          <span class="cp-ok" id="cp1">Copied!</span>
        </div>
        <div class="sku-box">
          <div class="sl"><i class="ti ti-wind"></i> Air handler SKU</div>
          <div class="sv" id="d-ah-sku"></div>
          <div class="sd" id="d-ah-desc"></div>
          <button class="cp-btn" onclick="doCopy('d-ah-sku','cp2')"><i class="ti ti-copy"></i> Copy</button>
          <span class="cp-ok" id="cp2">Copied!</span>
        </div>
      </div>
      <div class="badges">
        <span class="badge" id="b-type"></span>
        <span class="badge" id="b-series"></span>
        <span class="badge" id="b-stage"></span>
        <span class="badge" id="b-ton"></span>
      </div>
      <button class="reset-btn" onclick="reset()"><i class="ti ti-refresh"></i> Start over</button>
    </div>
  </div>
</div>

<script>
  const DATA = [
    {type:"ac",series:"Comfort Series",stage:"Single Stage",model:"24SCA5",sku:"24SCA524W003",tonnage:"2 ton",ahDesc:"Comfort Series Fan Coil (FB4C)",ahSku:"FB4CNF024L00"},
    {type:"ac",series:"Comfort Series",stage:"Single Stage",model:"24SCA5",sku:"24SCA536W003",tonnage:"3 ton",ahDesc:"Comfort Series Fan Coil (FB4C)",ahSku:"FB4CNF036L00"},
    {type:"ac",series:"Comfort Series",stage:"Single Stage",model:"24SCA5",sku:"24SCA542W003",tonnage:"3.5 ton",ahDesc:"Comfort Series Fan Coil (FB4C)",ahSku:"FB4CNF042L00"},
    {type:"ac",series:"Comfort Series",stage:"Single Stage",model:"24SCA5",sku:"24SCA548W003",tonnage:"4 ton",ahDesc:"Comfort Series Fan Coil (FB4C)",ahSku:"FB4CNF048L00"},
    {type:"ac",series:"Comfort Series",stage:"Single Stage",model:"24SCA5",sku:"24SCA560W003",tonnage:"5 ton",ahDesc:"Comfort Series Fan Coil (FB4C)",ahSku:"FB4CNF060L00"},
    {type:"ac",series:"Performance Series",stage:"Double Stage",model:"26TPA8",sku:"26TPA824W003",tonnage:"2 ton",ahDesc:"Performance Series Fan Coil (FV4C)",ahSku:"FV4CNF002L00"},
    {type:"ac",series:"Performance Series",stage:"Double Stage",model:"26TPA8",sku:"26TPA836W003",tonnage:"3 ton",ahDesc:"Performance Series Fan Coil (FV4C)",ahSku:"FV4CNF003L00"},
    {type:"ac",series:"Performance Series",stage:"Double Stage",model:"26TPA8",sku:"26TPA842W003",tonnage:"3.5 ton",ahDesc:"Performance Series Fan Coil (FV4C)",ahSku:"FV4CNF005L00"},
    {type:"ac",series:"Performance Series",stage:"Double Stage",model:"26TPA8",sku:"26TPA848W003",tonnage:"4 ton",ahDesc:"Performance Series Fan Coil (FV4C)",ahSku:"FV4CNF005L00"},
    {type:"ac",series:"Performance Series",stage:"Double Stage",model:"26TPA8",sku:"26TPA860W003",tonnage:"5 ton",ahDesc:"Performance Series Fan Coil (FV4C)",ahSku:"FV4CNF006L00"},
    {type:"ac",series:"Infinity System",stage:"Variable Speed",model:"26VNA1",sku:"26VNA124W003",tonnage:"2 ton",ahDesc:"Infinity Variable-Speed Fan Coil (FE4A)",ahSku:"FE4ANB003L00"},
    {type:"ac",series:"Infinity System",stage:"Variable Speed",model:"26VNA1",sku:"26VNA136W003",tonnage:"3 ton",ahDesc:"Infinity Variable-Speed Fan Coil (FE4A)",ahSku:"FE4ANB003L00"},
    {type:"ac",series:"Infinity System",stage:"Variable Speed",model:"26VNA1",sku:"26VNA142W003",tonnage:"3.5 ton",ahDesc:"Infinity Variable-Speed Fan Coil (FE4A)",ahSku:"FE4ANB005L00"},
    {type:"ac",series:"Infinity System",stage:"Variable Speed",model:"26VNA1",sku:"26VNA148W003",tonnage:"4 ton",ahDesc:"Infinity Variable-Speed Fan Coil (FE4A)",ahSku:"FE4ANB006L00"},
    {type:"ac",series:"Infinity System",stage:"Variable Speed",model:"26VNA1",sku:"26VNA160W003",tonnage:"5 ton",ahDesc:"Infinity Variable-Speed Fan Coil (FE4A)",ahSku:"FE4ANB006L00"},
    {type:"hp",series:"Comfort Series",stage:"Single Stage",model:"25SCA5",sku:"25SCA524A003",tonnage:"2 ton",ahDesc:"Comfort Series Fan Coil (FB4C)",ahSku:"FB4CNF024L00"},
    {type:"hp",series:"Comfort Series",stage:"Single Stage",model:"25SCA5",sku:"25SCA536A003",tonnage:"3 ton",ahDesc:"Comfort Series Fan Coil (FB4C)",ahSku:"FB4CNF036L00"},
    {type:"hp",series:"Comfort Series",stage:"Single Stage",model:"25SCA5",sku:"25SCA542A003",tonnage:"3.5 ton",ahDesc:"Comfort Series Fan Coil (FB4C)",ahSku:"FB4CNF042L00"},
    {type:"hp",series:"Comfort Series",stage:"Single Stage",model:"25SCA5",sku:"25SCA548A003",tonnage:"4 ton",ahDesc:"Comfort Series Fan Coil (FB4C)",ahSku:"FB4CNF048L00"},
    {type:"hp",series:"Comfort Series",stage:"Single Stage",model:"25SCA5",sku:"25SCA560A003",tonnage:"5 ton",ahDesc:"Comfort Series Fan Coil (FB4C)",ahSku:"FB4CNF060L00"},
    {type:"hp",series:"Performance Series",stage:"Two Stage",model:"25TPA7",sku:"25TPA724A003",tonnage:"2 ton",ahDesc:"Performance Series Fan Coil (FV4C)",ahSku:"FV4CNF002L00"},
    {type:"hp",series:"Performance Series",stage:"Two Stage",model:"25TPA7",sku:"25TPA736A003",tonnage:"3 ton",ahDesc:"Performance Series Fan Coil (FV4C)",ahSku:"FV4CNF003L00"},
    {type:"hp",series:"Performance Series",stage:"Two Stage",model:"25TPA7",sku:"25TPA748A003",tonnage:"4 ton",ahDesc:"Performance Series Fan Coil (FV4C)",ahSku:"FV4CNF005L00"},
    {type:"hp",series:"Performance Series",stage:"Two Stage",model:"25TPA7",sku:"25TPA760A003",tonnage:"5 ton",ahDesc:"Performance Series Fan Coil (FV4C)",ahSku:"FV4CNF006L00"},
    {type:"hp",series:"Infinity System",stage:"Variable Speed",model:"25VNA4",sku:"25VNA424A003",tonnage:"2 ton",ahDesc:"Infinity Variable-Speed Fan Coil (FE4A)",ahSku:"FE4ANB002L00"},
    {type:"hp",series:"Infinity System",stage:"Variable Speed",model:"25VNA4",sku:"25VNA436A003",tonnage:"3 ton",ahDesc:"Infinity Variable-Speed Fan Coil (FE4A)",ahSku:"FE4ANB003L00"},
    {type:"hp",series:"Infinity System",stage:"Variable Speed",model:"25VNA4",sku:"25VNA448A003",tonnage:"4 ton",ahDesc:"Infinity Variable-Speed Fan Coil (FE4A)",ahSku:"FE4ANB005L00"},
    {type:"hp",series:"Infinity System",stage:"Variable Speed",model:"25VNA4",sku:"25VNA460A003",tonnage:"5 ton",ahDesc:"Infinity Variable-Speed Fan Coil (FE4A)",ahSku:"FE4ANB006L00"},
  ];

  const SERIES_INFO = {
    "Comfort Series":     { stage: "Single stage",    desc: "Entry-level reliability" },
    "Performance Series": { stage: "Two / double stage", desc: "Enhanced efficiency" },
    "Infinity System":    { stage: "Variable speed",  desc: "Premium comfort control" },
  };

  let selType = null, selSeries = null;

  function showOnly(id) {
    ['p1','p2','p3'].forEach(p => document.getElementById(p).classList.remove('show'));
    if (id) document.getElementById(id).classList.add('show');
  }

  function setStep(n, val) {
    const vEl = document.getElementById('s' + n + 'v');
    const sEl = document.getElementById('s' + n);
    const placeholders = ['Equipment type', 'Series', 'Tonnage'];
    if (val) {
      vEl.textContent = val;
      vEl.classList.remove('placeholder');
      sEl.classList.add('done');
    } else {
      vEl.textContent = placeholders[n - 1];
      vEl.classList.add('placeholder');
      sEl.classList.remove('done');
    }
  }

  function goStep(n) {
    if (n === 1) {
      selType = null; selSeries = null;
      setStep(1, null); setStep(2, null); setStep(3, null);
      document.getElementById('detail').classList.remove('show');
      showOnly('p1');
    } else if (n === 2 && selType) {
      selSeries = null;
      setStep(2, null); setStep(3, null);
      document.getElementById('detail').classList.remove('show');
      renderSeries(); showOnly('p2');
    } else if (n === 3 && selSeries) {
      setStep(3, null);
      document.getElementById('detail').classList.remove('show');
      renderTonnage(); showOnly('p3');
    }
  }

  function pickType(t) {
    selType = t;
    setStep(1, t === 'ac' ? 'Air conditioner' : 'Heat pump');
    renderSeries();
    showOnly('p2');
  }

  function renderSeries() {
    const grid = document.getElementById('series-grid');
    grid.innerHTML = '';
    const series = [...new Set(DATA.filter(d => d.type === selType).map(d => d.series))];
    series.forEach(s => {
      const info = SERIES_INFO[s] || {};
      const el = document.createElement('div');
      el.className = 'series-card';
      el.innerHTML = `<div class="sc-name">${s}</div><div class="sc-stage">${info.stage || ''}</div><div class="sc-desc">${info.desc || ''}</div>`;
      el.onclick = () => pickSeries(s);
      grid.appendChild(el);
    });
  }

  function pickSeries(s) {
    selSeries = s;
    setStep(2, s);
    renderTonnage();
    showOnly('p3');
  }

  function renderTonnage() {
    const row = document.getElementById('ton-row');
    row.innerHTML = '';
    const tons = [...new Set(DATA.filter(d => d.type === selType && d.series === selSeries).map(d => d.tonnage))]
      .sort((a, b) => parseFloat(a) - parseFloat(b));
    tons.forEach(t => {
      const el = document.createElement('button');
      el.className = 'ton-pill';
      el.textContent = t;
      el.onclick = () => pickTonnage(t);
      row.appendChild(el);
    });
  }

  function pickTonnage(t) {
    setStep(3, t);
    showOnly(null);
    const match = DATA.find(d => d.type === selType && d.series === selSeries && d.tonnage === t);
    if (!match) return;
    const panel = document.getElementById('detail');
    panel.classList.add('show');
    document.getElementById('d-title').textContent =
      'Carrier ' + match.series + ' — ' + match.tonnage + ' ' + (match.type === 'ac' ? 'Air Conditioner' : 'Heat Pump');
    document.getElementById('d-sku').textContent    = match.sku;
    document.getElementById('d-model').textContent  = 'Model ' + match.model;
    document.getElementById('d-ah-sku').textContent  = match.ahSku;
    document.getElementById('d-ah-desc').textContent = match.ahDesc;
    document.getElementById('b-type').textContent   = match.type === 'ac' ? 'Air conditioner' : 'Heat pump';
    document.getElementById('b-series').textContent = match.series;
    document.getElementById('b-stage').textContent  = match.stage;
    document.getElementById('b-ton').textContent    = match.tonnage;
  }

  function doCopy(elId, msgId) {
    const val = document.getElementById(elId).textContent;
    navigator.clipboard.writeText(val).then(() => {
      const msg = document.getElementById(msgId);
      msg.style.display = 'inline';
      setTimeout(() => { msg.style.display = 'none'; }, 1500);
    });
  }

  function reset() {
    selType = null; selSeries = null;
    setStep(1, null); setStep(2, null); setStep(3, null);
    document.getElementById('detail').classList.remove('show');
    showOnly('p1');
  }
</script>

</body>
</html>
